name: Agent Football — Rapport quotidien

on:
  # Déclenchement automatique chaque jour à 8h heure française d'été (6h UTC).
  # NB : en hiver (UTC+1), ce cron correspond à 7h — ajuster à '0 7 * * *' si besoin.
  schedule:
    - cron: '0 6 * * *'

  # Déclenchement manuel depuis l'onglet "Actions" sur GitHub (pour tester)
  workflow_dispatch:

# Nécessaire pour committer bet_history.csv (suivi des performances)
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement de l'agent
        run: python football_agent.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          APIFOOTBALL_KEY:    ${{ secrets.APIFOOTBALL_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      # Sans ce commit, le runner (éphémère) détruit l'historique des paris
      # et le suivi ROI/yield/calibration est impossible.
      - name: Sauvegarde de l'historique des paris
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bet_history.csv bet_history_legacy.csv 2>/dev/null || git add bet_history.csv || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: mise à jour bet_history.csv [skip ci]"
            git pull --rebase origin main
            git push
          fi
